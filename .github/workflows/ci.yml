name: 🔄 CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build
        env:
          # Dummy values so the build doesn't fail on missing env vars
          SAP_B1_URL: https://placeholder:50000/b1s/v2/
          SAP_B1_USER: placeholder
          SAP_B1_PASS: placeholder
          SAP_B1_COMPANY: placeholder
          EMAIL_SMTP_HOST: placeholder
          EMAIL_USER: placeholder
          EMAIL_PASS: placeholder
          NOTIFY_EMAIL: placeholder@placeholder.com
          NEXT_PUBLIC_APP_NAME: Sistema de Pedidos
          NEXT_PUBLIC_COMPANY_NAME: TamaPrint
